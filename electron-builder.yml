appId: com.gooeypi.app
productName: Gooey Pi
copyright: Copyright © 2026

directories:
  output: dist-electron

files:
  - out/**
  - package.json

asar: true
asarUnpack:
  - node_modules/@earendil-works/pi-coding-agent/**/*
  - node_modules/koffi/**/*
  - node_modules/**/*.node

mac:
  category: public.app-category.developer-tools
  identity: null
  target:
    - dir
    - zip

compression: normal
generateUpdatesFilesForAllChannels: false
